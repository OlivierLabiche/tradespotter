<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSpotter</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .completion-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .date-filter-btn {
            padding: 0.35rem 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .date-filter-btn:hover { border-color: var(--border-active); color: var(--text-primary); }
        .date-filter-btn.active { background: var(--accent-info); color: #fff; border-color: var(--accent-info); }
        .completion-badge.logged { background: rgba(139, 139, 154, 0.2); color: #8b8b9a; }
        .completion-badge.inprogress { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        .completion-badge.incomplete {
            background: rgba(255, 165, 2, 0.2);
            color: #ffa502;
            animation: pulse-warning 2s infinite;
        }
        .completion-badge.complete { background: rgba(0, 212, 170, 0.2); color: #00d4aa; }
        @keyframes pulse-warning { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .needs-attention { border-left: 3px solid #ffa502; }

        /* Checkboxes */
        .trade-checkbox {
            width: 15px; height: 15px;
            cursor: pointer;
            accent-color: var(--accent-info);
            flex-shrink: 0;
        }
        th.col-check, td.col-check {
            width: 36px;
            text-align: center;
            padding-left: 0.75rem;
        }
        tr.selected-row { background: rgba(52, 152, 219, 0.06) !important; }

        .analyse-filter-btn {
            padding: 0.35rem 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .analyse-filter-btn:hover { border-color: var(--border-active); color: var(--text-primary); }
        .analyse-filter-btn.active { background: rgba(155, 89, 182, 0.2); color: #9b59b6; border-color: #9b59b6; }
        .analyse-done-badge {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent-bull);
            margin-left: 4px;
            vertical-align: middle;
        }

        /* Barre d'export flottante */
        .export-bar {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--bg-card);
            border: 1px solid var(--border-active);
            border-radius: 14px;
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
            white-space: nowrap;
        }
        .export-bar.visible { transform: translateX(-50%) translateY(0); }
        .export-bar .export-count {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-info);
        }
        .export-bar .export-divider {
            width: 1px; height: 20px;
            background: var(--border-color);
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">TradeSpotter</a>
        <div class="header-actions">
            <a href="analyse.html" class="btn btn-secondary">🔍 Analyse</a>
            <a href="trade.html" class="btn btn-primary">+ Nouveau Trade</a>
        </div>
    </header>

    <main class="container">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Win Rate</div></div>
            <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Wins</div></div>
            <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Losses</div></div>
            <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">BE</div></div>
            <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Total R</div></div>
            <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">En cours</div></div>
        </div>

        <div id="analyseProgress" style="display:none; margin-bottom:1rem; padding:0.6rem 1rem; background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius); font-size:0.85rem; color:var(--text-secondary);">
            🔬 Analyse post-hoc : <strong id="analyseDone">—</strong>/<strong id="analyseTotal">—</strong> trades analysés
        </div>

        <!-- Trades List -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📊 Historique</h2>
            </div>
            <div class="card-content">
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">Tous</button>
                    <button class="filter-btn" data-filter="encours">🔄 En cours</button>
                    <button class="filter-btn" data-filter="incomplete">⚠️ Incomplets</button>
                    <button class="filter-btn" data-filter="tp">✅ TP</button>
                    <button class="filter-btn" data-filter="sl">❌ SL</button>
                </div>
                <div class="filters" style="margin-top: 0.5rem;">
                    <button class="date-filter-btn active" data-period="all">📅 Tout</button>
                    <button class="date-filter-btn" data-period="today">Aujourd'hui</button>
                    <button class="date-filter-btn" data-period="week">Cette semaine</button>
                    <button class="date-filter-btn" data-period="month">Ce mois</button>
                </div>
                <div class="filters" style="margin-top: 0.5rem;">
                    <button class="analyse-filter-btn active" data-afilter="all">🔬 Tous</button>
                    <button class="analyse-filter-btn" data-afilter="done">✅ Analysés</button>
                    <button class="analyse-filter-btn" data-afilter="todo">⏳ Non analysés</button>
                </div>

                <div class="table-container">
                    <table class="trades-table">
                        <thead>
                            <tr>
                                <th class="col-check">
                                    <input type="checkbox" class="trade-checkbox" id="selectAllChk" title="Tout sélectionner" onchange="toggleSelectAll(this.checked)">
                                </th>
                                <th>Date</th>
                                <th>Actif</th>
                                <th>Dir</th>
                                <th>Résultat</th>
                                <th>Mindset</th>
                                <th>Complétion</th>
                                <th>RR</th>
                                <th title="Analyse post-hoc">🔬</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tradesBody">
                            <tr>
                                <td colspan="10" class="loading">
                                    <div class="spinner"></div>
                                    Chargement...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Barre d'export flottante -->
    <div class="export-bar" id="exportBar">
        <span class="export-count" id="exportCount">0 trade sélectionné</span>
        <div class="export-divider"></div>
        <button class="btn btn-sm btn-secondary" onclick="deselectAll()">✕ Désélectionner</button>
        <button class="btn btn-sm btn-primary" onclick="downloadExport()">📥 Télécharger le JSON</button>
    </div>

    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/trades.js"></script>
    <script>
        let currentFilter = 'all';
        let currentDateFilter = 'all';
        let currentAnalyseFilter = 'all';
        let allTrades = [];
        let selectedIds = new Set();

        document.addEventListener('DOMContentLoaded', async () => {
            await loadStats();
            await loadTrades();
            setupFilters();
        });

        async function loadStats() {
            try {
                const stats = await getStats();
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${stats.total}</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.winRate}%</div>
                        <div class="stat-label">Win Rate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.wins}</div>
                        <div class="stat-label">Wins</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.losses}</div>
                        <div class="stat-label">Losses</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value neutral">${stats.be}</div>
                        <div class="stat-label">BE</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value ${parseFloat(stats.totalR) < 0 ? 'negative' : ''}">${stats.totalR}R</div>
                        <div class="stat-label">Total R</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value neutral">${stats.encours}</div>
                        <div class="stat-label">🔄 En cours</div>
                    </div>
                `;
            } catch (error) {
                console.error('Erreur stats:', error);
            }
        }

        async function loadTrades() {
            try {
                allTrades = await getTrades();
                applyFilter();
                loadAnalyseProgress();
            } catch (error) {
                console.error('Erreur trades:', error);
                document.getElementById('tradesBody').innerHTML = `
                    <tr><td colspan="10" class="empty-state">
                        <div class="icon">⚠️</div>
                        Erreur de connexion à la base de données
                    </td></tr>
                `;
            }
        }

        function filterByDate(trades) {
            if (currentDateFilter === 'all') return trades;
            const now = new Date();

            if (currentDateFilter === 'today') {
                const today = now.toISOString().split('T')[0];
                return trades.filter(t => t.trade_date === today);
            }
            if (currentDateFilter === 'week') {
                const day = now.getDay(); // 0=dim, 1=lun...
                const diff = day === 0 ? -6 : 1 - day; // ramène au lundi
                const monday = new Date(now);
                monday.setDate(now.getDate() + diff);
                const startStr = monday.toISOString().split('T')[0];
                return trades.filter(t => t.trade_date >= startStr);
            }
            if (currentDateFilter === 'month') {
                const startOfMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
                return trades.filter(t => t.trade_date >= startOfMonth);
            }
            return trades;
        }

        function applyFilter() {
            let filtered = filterByDate(allTrades);

            if (currentFilter === 'encours') {
                filtered = filtered.filter(t => t.status === 'encours');
            } else if (currentFilter === 'tp') {
                filtered = filtered.filter(t => t.status === 'tp');
            } else if (currentFilter === 'sl') {
                filtered = filtered.filter(t => t.status === 'sl');
            } else if (currentFilter === 'incomplete') {
                filtered = filtered.filter(t => getCompletionStatus(t).alert);
            }

            if (currentAnalyseFilter === 'done') {
                filtered = filtered.filter(t => t.analyse_posthoc_done === true);
            } else if (currentAnalyseFilter === 'todo') {
                filtered = filtered.filter(t => !t.analyse_posthoc_done);
            }

            renderTrades(filtered);
        }

        async function loadAnalyseProgress() {
            try {
                const prog = await getAnalyseProgress();
                document.getElementById('analyseDone').textContent = prog.done;
                document.getElementById('analyseTotal').textContent = prog.total;
                document.getElementById('analyseProgress').style.display = prog.total > 0 ? 'block' : 'none';
            } catch(e) {}
        }

        function renderTrades(trades) {
            const tbody = document.getElementById('tradesBody');
            
            if (trades.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="10" class="empty-state">
                        <div class="icon">📭</div>
                        Aucun trade
                    </td></tr>
                `;
                return;
            }

            tbody.innerHTML = trades.map(t => {
                const completion = getCompletionStatus(t);
                const isSelected = selectedIds.has(String(t.id));
                return `
                <tr class="${t.status === 'encours' ? 'encours' : ''} ${completion.alert ? 'needs-attention' : ''} ${isSelected ? 'selected-row' : ''}" onclick="window.location='trade.html?id=${t.id}'" style="cursor:pointer">
                    <td class="col-check" onclick="event.stopPropagation()">
                        <input type="checkbox" class="trade-checkbox" data-id="${t.id}"
                            ${isSelected ? 'checked' : ''}
                            onchange="toggleSelect('${t.id}', this.checked)">
                    </td>
                    <td>${formatDate(t.trade_date)}</td>
                    <td><strong>${t.asset}</strong></td>
                    <td><span class="badge ${t.direction}">${t.direction?.toUpperCase() || '-'}</span></td>
                    <td>${renderStatus(t.status)}</td>
                    <td>${renderMindset(t.mindset)}</td>
                    <td>${renderCompletion(completion)}</td>
                    <td>${t.r_obtenu != null ? (t.r_obtenu > 0 ? '+' : '') + t.r_obtenu : '-'}</td>
                    <td style="text-align:center;">
                        ${t.analyse_posthoc_done ? '<span title="Analysé" style="color:var(--accent-bull);font-size:0.85rem;">✓</span>' : '<span style="color:var(--border-color);font-size:0.75rem;">·</span>'}
                    </td>
                    <td><button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); window.location='trade.html?id=${t.id}'">✏️</button></td>
                </tr>
            `}).join('');
        }

        // Statut de complétion
        function getCompletionStatus(trade) {
            const isFinished = trade.status && trade.status !== 'encours';

            if (!isFinished) return { level: 1, label: '⏳ En cours', alert: false };

            const isComplete =
                trade.tf_htf &&
                trade.tf_ltf &&
                trade.setup &&
                trade.mindset &&
                trade.img_entry &&
                trade.img_exit &&
                trade.probleme_principal &&
                (trade.r_obtenu !== null && trade.r_obtenu !== undefined) &&
                (trade.r_max_atteint !== null && trade.r_max_atteint !== undefined);

            if (!isComplete) return { level: 3, label: '⚠️ Incomplet', alert: true };
            return { level: 5, label: '✅ Complet', alert: false };
        }

        function renderMindset(mindset) {
            if (mindset === 'plan')     return '<span class="badge" style="background:rgba(0,184,148,0.15);color:#00b894">🎯 Plan</span>';
            if (mindset === 'intuitif') return '<span class="badge" style="background:rgba(230,126,34,0.15);color:#e67e22">🎲 Intuitif</span>';
            return '<span style="color:var(--text-muted)">-</span>';
        }

        function renderCompletion(completion) {
            if (completion.level === 1) return `<span class="completion-badge logged">${completion.label}</span>`;
            if (completion.level === 2) return `<span class="completion-badge inprogress">${completion.label}</span>`;
            if (completion.level === 3) return `<span class="completion-badge incomplete">${completion.label}</span>`;
            return `<span class="completion-badge complete">${completion.label}</span>`;
        }

        function renderStatus(status) {
            const badges = {
                'encours': '<span class="badge encours">🔄 En cours</span>',
                'tp': '<span class="badge tp">✅ TP</span>',
                'be': '<span class="badge be">⚖️ BE</span>',
                'sl': '<span class="badge sl">❌ SL</span>',
                'positif': '<span class="badge positif">💰 Positif</span>'
            };
            return badges[status] || '-';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
        }

        function setupFilters() {
            // Filtres statut
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    applyFilter();
                });
            });
            // Filtres date
            document.querySelectorAll('.date-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.date-filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDateFilter = btn.dataset.period;
                    applyFilter();
                });
            });
            // Filtres analyse
            document.querySelectorAll('.analyse-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.analyse-filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentAnalyseFilter = btn.dataset.afilter;
                    applyFilter();
                });
            });
        }

        // Sélection
        function toggleSelect(id, checked) {
            if (checked) selectedIds.add(String(id));
            else selectedIds.delete(String(id));
            updateExportBar();
            syncSelectAllCheckbox();
            // Mettre à jour la classe de la ligne
            const row = document.querySelector(`input[data-id="${id}"]`)?.closest('tr');
            if (row) row.classList.toggle('selected-row', checked);
        }

        function toggleSelectAll(checked) {
            const visible = document.querySelectorAll('.trade-checkbox[data-id]');
            visible.forEach(chk => {
                chk.checked = checked;
                const id = chk.dataset.id;
                if (checked) selectedIds.add(String(id));
                else selectedIds.delete(String(id));
                chk.closest('tr').classList.toggle('selected-row', checked);
            });
            updateExportBar();
        }

        function deselectAll() {
            selectedIds.clear();
            document.querySelectorAll('.trade-checkbox[data-id]').forEach(chk => {
                chk.checked = false;
                chk.closest('tr').classList.remove('selected-row');
            });
            const selectAllChk = document.getElementById('selectAllChk');
            if (selectAllChk) selectAllChk.checked = false;
            updateExportBar();
        }

        function syncSelectAllCheckbox() {
            const allChks = document.querySelectorAll('.trade-checkbox[data-id]');
            const selectAllChk = document.getElementById('selectAllChk');
            if (!selectAllChk || allChks.length === 0) return;
            const allChecked = [...allChks].every(chk => chk.checked);
            selectAllChk.checked = allChecked;
            selectAllChk.indeterminate = !allChecked && selectedIds.size > 0;
        }

        function updateExportBar() {
            const bar = document.getElementById('exportBar');
            const count = document.getElementById('exportCount');
            const n = selectedIds.size;
            bar.classList.toggle('visible', n > 0);
            count.textContent = n === 1 ? '1 trade sélectionné' : `${n} trades sélectionnés`;
        }

        function downloadExport() {
            const trades = allTrades.filter(t => selectedIds.has(String(t.id)));
            if (trades.length === 0) { showToast('⚠️ Aucun trade sélectionné', true); return; }

            const exportData = trades;

            const date = new Date().toISOString().split('T')[0];
            const json = JSON.stringify(exportData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `trades-export-${date}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`📥 ${trades.length} trade(s) exporté(s) !`);
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.toggle('error', isError);
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }
    </script>
</body>
</html>
