<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade - TradeSpotter</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">TradeSpotter</a>
        <div class="header-actions">
            <a href="index.html" class="btn btn-secondary">← Retour</a>
            <button class="btn btn-danger" id="btnDelete" style="display:none" onclick="handleDelete()">🗑️ Supprimer</button>
        </div>
    </header>

    <main class="container">
        <!-- Banner pour extension -->
        <div class="extension-banner" id="extensionBanner" style="display:none">
            <span>📸 Screenshot dans le presse-papier</span>
            <span class="hint">Cliquez sur la zone image + <kbd>Ctrl</kbd>+<kbd>V</kbd> pour coller</span>
        </div>

        <!-- Identification -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📋 Identification</h2>
                <span class="badge" id="statusBadge"></span>
            </div>
            <div class="card-content">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Actif</label>
                        <input type="text" class="form-input" id="asset" placeholder="BTCUSD" style="text-transform: uppercase;">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-input" id="tradeDate">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Heure</label>
                        <input type="time" class="form-input" id="tradeTime">
                    </div>
                    <div class="form-group">
                        <label class="form-label">TF HTF</label>
                        <select class="form-select" id="tfHTF">
                            <option value="">--</option>
                            <option value="M5">M5</option>
                            <option value="M8">M8</option>
                            <option value="M15">M15</option>
                            <option value="M30">M30</option>
                            <option value="H1">H1</option>
                            <option value="H4">H4</option>
                            <option value="D1">D1</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">TF LTF</label>
                        <select class="form-select" id="tfLTF">
                            <option value="">--</option>
                            <option value="M1">M1</option>
                            <option value="M2">M2</option>
                            <option value="M5">M5</option>
                            <option value="M8">M8</option>
                            <option value="M10">M10</option>
                            <option value="M15">M15</option>
                            <option value="M30">M30</option>
                            <option value="H1">H1</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Mode</label>
                        <select class="form-select" id="mode">
                            <option value="live">🔴 Live</option>
                            <option value="backtest">📚 Backtest</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label class="form-label">Direction</label>
                    <div class="direction-toggle">
                        <button type="button" class="direction-btn long" onclick="setDirection('long')">📈 LONG</button>
                        <button type="button" class="direction-btn short" onclick="setDirection('short')">📉 SHORT</button>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label class="form-label">Setup</label>
                    <div class="combobox" id="setupCombobox">
                        <input type="text" class="form-input" id="setup" placeholder="Ex: BOS + FVG, Liquidation sweep..." autocomplete="off">
                        <button type="button" class="combobox-toggle" onclick="toggleSetupDropdown()">▾</button>
                        <div class="combobox-list" id="setupList"></div>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label class="form-label">Mindset</label>
                    <div class="direction-toggle">
                        <button type="button" class="mindset-btn plan" onclick="setMindset('plan')">🎯 Plan</button>
                        <button type="button" class="mindset-btn intuitif" onclick="setMindset('intuitif')">🎲 Intuitif</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Screenshots -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📸 Screenshots</h2>
            </div>
            <div class="card-content">
                <div class="images-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
                    <!-- Prise de position -->
                    <div class="image-field">
                        <label>Prise de position</label>
                        <input type="text" class="form-input" id="imgEntryUrl" placeholder="Lien TradingView ou URL image..." style="margin-bottom: 0.5rem;">
                        <div class="image-drop-zone" id="dropEntry" tabindex="0">
                            <div class="icon">📷</div>
                            <div class="text">Glisser une image ou Ctrl+V</div>
                            <div class="hint">ou cliquer pour sélectionner</div>
                        </div>
                        <div class="image-preview-container" id="previewEntryContainer">
                            <img class="image-preview" id="previewEntry" onclick="zoomImage(this.src)">
                            <button class="btn-remove-image" onclick="removeImage('entry')">✕</button>
                        </div>
                    </div>

                    <!-- Trade fini (HTF) -->
                    <div class="image-field">
                        <label>Trade fini (vue HTF)</label>
                        <input type="text" class="form-input" id="imgExitUrl" placeholder="Lien TradingView ou URL image..." style="margin-bottom: 0.5rem;">
                        <div class="image-drop-zone" id="dropExit" tabindex="0">
                            <div class="icon">📷</div>
                            <div class="text">Glisser une image ou Ctrl+V</div>
                            <div class="hint">ou cliquer pour sélectionner</div>
                        </div>
                        <div class="image-preview-container" id="previewExitContainer">
                            <img class="image-preview" id="previewExit" onclick="zoomImage(this.src)">
                            <button class="btn-remove-image" onclick="removeImage('exit')">✕</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Résultat -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">🎯 Résultat</h2>
            </div>
            <div class="card-content">
                <div class="result-options">
                    <button class="result-btn encours" onclick="setStatus('encours')">🔄 En cours</button>
                    <button class="result-btn tp" onclick="setStatus('tp')">✅ TP</button>
                    <button class="result-btn be" onclick="setStatus('be')">⚖️ BE</button>
                    <button class="result-btn sl" onclick="setStatus('sl')">❌ SL</button>
                    <button class="result-btn positif" onclick="setStatus('positif')">💰 Positif</button>
                </div>

                <!-- Analyse qualitative -->
                <div style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.6rem;">
                    <div class="analyse-item">
                        <div class="analyse-header">
                            <span class="analyse-label">Biais</span>
                            <div class="toggle-buttons compact">
                                <button type="button" class="toggle-btn bon-btn" data-field="biais" data-value="bon" onclick="setBonMauvais('biais', 'bon')">✅ Bon</button>
                                <button type="button" class="toggle-btn mauvais-btn" data-field="biais" data-value="mauvais" onclick="setBonMauvais('biais', 'mauvais')">❌ Mauvais</button>
                            </div>
                        </div>
                    </div>
                    <div class="analyse-item">
                        <div class="analyse-header">
                            <span class="analyse-label">POI</span>
                            <div class="toggle-buttons compact">
                                <button type="button" class="toggle-btn bon-btn" data-field="poi" data-value="bon" onclick="setBonMauvais('poi', 'bon')">✅ Bon</button>
                                <button type="button" class="toggle-btn mauvais-btn" data-field="poi" data-value="mauvais" onclick="setBonMauvais('poi', 'mauvais')">❌ Mauvais</button>
                            </div>
                        </div>
                    </div>
                    <div class="analyse-item">
                        <div class="analyse-header">
                            <span class="analyse-label">Prise de position</span>
                            <div class="toggle-buttons compact">
                                <button type="button" class="toggle-btn bon-btn" data-field="prisePosition" data-value="bon" onclick="setBonMauvais('prisePosition', 'bon')">✅ Bon</button>
                                <button type="button" class="toggle-btn mauvais-btn" data-field="prisePosition" data-value="mauvais" onclick="setBonMauvais('prisePosition', 'mauvais')">❌ Mauvais</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-grid-2" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label class="form-label">R obtenu</label>
                        <input type="number" class="form-input" id="rObtenu" step="0.1" placeholder="Ex: 2.0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Potentiel R</label>
                        <input type="number" class="form-input" id="potentielR" step="0.1" placeholder="Ex: 3.5">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label class="form-label">Sortie partielle ?</label>
                    <textarea class="form-textarea" id="sortiePartielle" placeholder="Ex: sorti 50% à +2R, laissé courir..."></textarea>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label class="form-label">Notes / Analyse</label>
                    <textarea class="form-textarea" id="notes" placeholder="Ce qui a bien/mal fonctionné..."></textarea>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions-bar">
            <button class="btn btn-primary" id="btnSave" onclick="handleSave()">💾 Enregistrer</button>
        </div>
    </main>

    <!-- Modal Image -->
    <div class="modal-overlay" id="imageModal" onclick="closeModal()">
        <button class="modal-close" onclick="closeModal()">×</button>
        <img class="modal-image" id="modalImage">
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <style>
        /* Banner extension */
        .extension-banner {
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.15), rgba(0, 212, 170, 0.05));
            border: 1px solid var(--accent-bull);
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: bannerPulse 2s ease-in-out infinite;
        }
        .extension-banner span:first-child { font-weight: 600; color: var(--accent-bull); }
        .extension-banner .hint { color: var(--text-secondary); font-size: 0.85rem; }
        .extension-banner kbd {
            background: var(--bg-tertiary);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
        }
        @keyframes bannerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

        .image-drop-zone.from-extension {
            border-color: var(--accent-bull);
            animation: dropZonePulse 1.5s ease-in-out infinite;
        }
        @keyframes dropZonePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(0, 212, 170, 0); }
        }

        /* Analyse items */
        .analyse-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        .analyse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .analyse-label { font-weight: 600; font-size: 0.9rem; }
        .analyse-sub { display: flex; flex-direction: column; gap: 0.5rem; }
        .analyse-item .form-input { margin-top: 0.5rem; }

        /* Combobox Setup */
        .combobox { position: relative; }
        .combobox .form-input { padding-right: 2.5rem; cursor: pointer; }
        .combobox-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1rem;
            padding: 0;
            line-height: 1;
        }
        .combobox-toggle:hover { color: var(--text-primary); }
        .combobox-list {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            z-index: 200;
            max-height: 220px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .combobox-list.open { display: block; }
        .combobox-list-item {
            padding: 0.6rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: background 0.1s;
        }
        .combobox-list-item:hover { background: var(--bg-tertiary); }
        .combobox-list-empty {
            padding: 0.6rem 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-style: italic;
        }

        /* Mindset buttons */
        .mindset-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mindset-btn.plan.active  { background: rgba(0,184,148,0.15); color: var(--accent-bull); border-color: var(--accent-bull); }
        .mindset-btn.intuitif.active { background: rgba(230,126,34,0.15); color: var(--accent-warning); border-color: var(--accent-warning); }
        .mindset-btn:hover { border-color: var(--border-active); color: var(--text-primary); }

        /* Bon / Mauvais */
        .toggle-btn.bon-btn.active    { background: var(--accent-bull);  color: #fff; border-color: var(--accent-bull); }
        .toggle-btn.mauvais-btn.active { background: var(--accent-bear); color: #fff; border-color: var(--accent-bear); }

        /* Toggle buttons compact */
        .toggle-buttons { display: flex; gap: 0.5rem; }
        .toggle-buttons.compact .toggle-btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .toggle-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .toggle-btn:hover { border-color: var(--border-active); color: var(--text-primary); }
        .toggle-btn.active { background: var(--accent-bull); color: var(--bg-primary); border-color: var(--accent-bull); }
    </style>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/trades.js"></script>
    <script src="js/images.js"></script>
    <script>
        // State
        let tradeId = null;
        let isNew = true;
        let fromExtension = false;
        let allSetups = [];
        const state = {
            direction: null,
            status: 'encours',
            mindset: null,
            biais: null,
            poi: null,
            prisePosition: null,
            images: { entry: null, exit: null }
        };

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            tradeId = params.get('id');
            fromExtension = params.get('from') === 'extension';
            
            if (tradeId) {
                isNew = false;
                await loadTrade(tradeId);
                document.getElementById('btnDelete').style.display = 'block';
                document.getElementById('btnSave').textContent = '💾 Mettre à jour';
            } else {
                setDefaults();
                if (fromExtension) prefillFromExtension(params);
            }

            setupImageInputs();
            setupDropZones();
            initSetups();
        });

        // Préremplir depuis l'extension
        function prefillFromExtension(params) {
            document.getElementById('extensionBanner').style.display = 'flex';
            
            const asset = params.get('asset');
            if (asset) document.getElementById('asset').value = asset.toUpperCase();
            
            const direction = params.get('direction');
            if (direction) setDirection(direction);

            const mindset = params.get('mindset');
            if (mindset) setMindset(mindset);
            
            const date = params.get('date');
            if (date) document.getElementById('tradeDate').value = date;
            
            const time = params.get('time');
            if (time) document.getElementById('tradeTime').value = time;
            
            const tf = params.get('tf');
            if (tf) {
                const tfMap = { '1': 'M1', '1m': 'M1', '2': 'M2', '2m': 'M2', '5': 'M5', '5m': 'M5', '8': 'M8', '8m': 'M8', '10': 'M10', '10m': 'M10', '15': 'M15', '15m': 'M15', '30': 'M30', '30m': 'M30', '60': 'H1', '1h': 'H1', '240': 'H4', '4h': 'H4', 'd': 'D1', '1d': 'D1' };
                const mapped = tfMap[tf.toLowerCase()] || tfMap[tf];
                if (mapped) document.getElementById('tfLTF').value = mapped;
            }
            
            const setup = params.get('setup');
            if (setup) document.getElementById('setup').value = setup;

            const dropEntry = document.getElementById('dropEntry');
            dropEntry.classList.add('from-extension');
            dropEntry.focus();
            
            showToast('📸 Ctrl+V pour coller le screenshot');
        }

        function setDefaults() {
            const now = new Date();
            document.getElementById('tradeDate').value = now.toISOString().split('T')[0];
            document.getElementById('tradeTime').value = now.toTimeString().slice(0, 5);
            setStatus('encours');
        }

        // Load existing trade
        async function loadTrade(id) {
            try {
                const trade = await getTrade(id);
                
                document.getElementById('asset').value = trade.asset || '';
                document.getElementById('tradeDate').value = trade.trade_date || '';
                document.getElementById('tradeTime').value = trade.trade_time?.slice(0, 5) || '';
                document.getElementById('tfHTF').value = trade.tf_htf || '';
                document.getElementById('tfLTF').value = trade.tf_ltf || '';
                document.getElementById('mode').value = trade.mode || 'live';
                
                if (trade.direction) setDirection(trade.direction);
                if (trade.setup) document.getElementById('setup').value = trade.setup;
                if (trade.mindset) setMindset(trade.mindset);

                // Images
                if (trade.img_entry) loadImagePreview('entry', trade.img_entry);
                if (trade.img_exit) loadImagePreview('exit', trade.img_exit);

                // Résultat
                if (trade.status) setStatus(trade.status);
                if (trade.biais) setBonMauvais('biais', trade.biais);
                if (trade.poi) setBonMauvais('poi', trade.poi);
                if (trade.prise_position) setBonMauvais('prisePosition', trade.prise_position);
                document.getElementById('potentielR').value = trade.potentiel_r || '';
                document.getElementById('rObtenu').value = trade.r_obtenu || '';
                document.getElementById('sortiePartielle').value = trade.sortie_partielle || '';
                document.getElementById('notes').value = trade.notes_exit || '';
                
                updateStatusBadge(trade.status);
            } catch (error) {
                console.error('Erreur chargement:', error);
                showToast('❌ Erreur de chargement', true);
            }
        }

        // Direction
        function setDirection(value) {
            state.direction = value;
            document.querySelectorAll('.direction-btn').forEach(btn => {
                btn.classList.toggle('active', btn.classList.contains(value));
            });
        }

        // Status
        function setStatus(value) {
            state.status = value;
            document.querySelectorAll('.result-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.classList.contains(value)) btn.classList.add('active');
            });
            updateStatusBadge(value);
        }

        function updateStatusBadge(status) {
            const badge = document.getElementById('statusBadge');
            const badges = { 'encours': '🔄 En cours', 'tp': '✅ TP', 'be': '⚖️ BE', 'sl': '❌ SL', 'positif': '💰 Positif' };
            badge.textContent = badges[status] || '';
            badge.className = `badge ${status}`;
        }

        // Mindset
        function setMindset(value) {
            state.mindset = value;
            document.querySelectorAll('.mindset-btn').forEach(btn => {
                btn.classList.toggle('active', btn.classList.contains(value));
            });
        }

        // Biais / POI / Prise de position
        function setBonMauvais(field, value) {
            state[field] = value;
            document.querySelectorAll(`.toggle-btn[data-field="${field}"]`).forEach(btn => {
                btn.classList.toggle('active', btn.dataset.value === value);
            });
        }

        // Images
        function setupImageInputs() {
            ['Entry', 'Exit'].forEach(type => {
                const input = document.getElementById(`img${type}Url`);
                input.addEventListener('change', async () => {
                    const url = input.value.trim();
                    if (url) {
                        try {
                            showToast('📤 Upload en cours...');
                            const id = tradeId || 'new_' + Date.now();
                            // Upload réel vers Supabase via uploadFromTradingView
                            const uploadedUrl = await uploadFromTradingView(url, id, type.toLowerCase());
                            state.images[type.toLowerCase()] = uploadedUrl;
                            loadImagePreview(type.toLowerCase(), uploadedUrl);
                            showToast('✅ Image uploadée');
                        } catch (error) {
                            // Fallback : afficher l'URL directement si l'upload échoue (ex: CORS)
                            try {
                                const imageUrl = await downloadTradingViewImage(url);
                                loadImagePreview(type.toLowerCase(), imageUrl);
                            } catch (e) {
                                showToast('❌ URL invalide', true);
                            }
                        }
                    }
                });
            });
        }

        function setupDropZones() {
            // Mémorise la dernière zone survolée pour savoir où coller avec Ctrl+V
            let lastPasteTarget = 'entry';

            ['entry', 'exit'].forEach(type => {
                const dropZone = document.getElementById(`drop${type.charAt(0).toUpperCase() + type.slice(1)}`);

                dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
                dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });

                dropZone.addEventListener('drop', async e => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) await handleImageUpload(type, file);
                });

                dropZone.addEventListener('click', () => {
                    lastPasteTarget = type;
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = async e => { if (e.target.files[0]) await handleImageUpload(type, e.target.files[0]); };
                    input.click();
                });

                // Surveiller le survol pour cibler le bon slot lors du Ctrl+V
                dropZone.addEventListener('mouseenter', () => { lastPasteTarget = type; });
            });

            // Handler global — fonctionne sans focus sur la zone
            // Il suffit de survoler la zone cible avant de faire Ctrl+V
            document.addEventListener('paste', async e => {
                // Ne pas intercepter si l'utilisateur colle du texte dans un champ texte normal
                const active = document.activeElement;
                if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')
                    && active.id !== 'imgEntryUrl' && active.id !== 'imgExitUrl') return;

                const imageItem = [...e.clipboardData.items].find(item => item.type.startsWith('image/'));
                if (!imageItem) return;

                e.preventDefault();
                await handleImageUpload(lastPasteTarget, imageItem.getAsFile());

                const dropZone = document.getElementById(`drop${lastPasteTarget.charAt(0).toUpperCase() + lastPasteTarget.slice(1)}`);
                if (dropZone) dropZone.classList.remove('from-extension');
                if (fromExtension && lastPasteTarget === 'entry') {
                    document.getElementById('extensionBanner').style.display = 'none';
                }
            });
        }

        async function handleImageUpload(type, file) {
            try {
                showToast('📤 Upload en cours...');
                const id = tradeId || 'new_' + Date.now();
                const url = await uploadImage(file, id, type);
                state.images[type] = url;
                loadImagePreview(type, url);
                showToast('✅ Image uploadée');
            } catch (error) {
                console.error('Erreur upload:', error);
                showToast('❌ Erreur upload', true);
            }
        }

        function loadImagePreview(type, url) {
            const Type = type.charAt(0).toUpperCase() + type.slice(1);
            state.images[type] = url;
            document.getElementById(`preview${Type}`).src = url;
            document.getElementById(`preview${Type}Container`).classList.add('visible');
            document.getElementById(`drop${Type}`).style.display = 'none';
            document.getElementById(`img${Type}Url`).value = url;
        }

        function removeImage(type) {
            const Type = type.charAt(0).toUpperCase() + type.slice(1);
            state.images[type] = null;
            document.getElementById(`preview${Type}Container`).classList.remove('visible');
            document.getElementById(`drop${Type}`).style.display = 'flex';
            document.getElementById(`img${Type}Url`).value = '';
        }

        function zoomImage(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('visible');
        }
        function closeModal() { document.getElementById('imageModal').classList.remove('visible'); }

        // Save
        async function handleSave() {
            const asset = document.getElementById('asset').value.toUpperCase().trim();
            if (!asset) { showToast('❌ Actif requis', true); return; }
            if (!state.direction) { showToast('❌ Direction requise', true); return; }

            const btnSave = document.getElementById('btnSave');
            btnSave.disabled = true;
            btnSave.textContent = '⏳ Sauvegarde...';

            try {
                const tradeData = {
                    asset,
                    direction: state.direction,
                    setup: document.getElementById('setup').value.trim() || null,
                    mindset: state.mindset || null,
                    trade_date: document.getElementById('tradeDate').value,
                    trade_time: document.getElementById('tradeTime').value,
                    tf_htf: document.getElementById('tfHTF').value || null,
                    tf_ltf: document.getElementById('tfLTF').value || null,
                    mode: document.getElementById('mode').value,

                    status: state.status,
                    biais: state.biais || null,
                    poi: state.poi || null,
                    prise_position: state.prisePosition || null,
                    potentiel_r: parseFloat(document.getElementById('potentielR').value) || null,
                    r_obtenu: parseFloat(document.getElementById('rObtenu').value) || null,
                    sortie_partielle: document.getElementById('sortiePartielle').value.trim() || null,
                    notes_exit: document.getElementById('notes').value || null,

                    img_entry: state.images.entry || null,
                    img_exit: state.images.exit || null
                };

                if (isNew) {
                    const newTrade = await createTrade(tradeData);
                    tradeId = newTrade.id;
                    isNew = false;
                    showToast('✅ Trade créé !');
                    window.history.replaceState({}, '', `trade.html?id=${tradeId}`);
                    document.getElementById('btnDelete').style.display = 'block';
                } else {
                    await updateTrade(tradeId, tradeData);
                    showToast('✅ Trade mis à jour !');
                }

                btnSave.textContent = '💾 Enregistrer';
                btnSave.disabled = false;
            } catch (error) {
                console.error('Erreur sauvegarde:', error);
                showToast('❌ Erreur de sauvegarde', true);
                btnSave.textContent = '💾 Enregistrer';
                btnSave.disabled = false;
            }
        }

        // Delete
        async function handleDelete() {
            if (!confirm('Supprimer ce trade ?')) return;
            try {
                await deleteTrade(tradeId);
                showToast('🗑️ Trade supprimé');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (error) {
                showToast('❌ Erreur de suppression', true);
            }
        }

        // Combobox Setup
        async function initSetups() {
            try {
                allSetups = await getSetups();
            } catch(e) {
                console.error('Erreur chargement setups:', e);
            }

            const input = document.getElementById('setup');
            const list  = document.getElementById('setupList');

            function renderList(setups) {
                if (!setups.length) {
                    list.innerHTML = '<div class="combobox-list-empty">Aucun setup — tapez pour en créer un</div>';
                } else {
                    list.innerHTML = setups.map(s => `<div class="combobox-list-item">${s}</div>`).join('');
                }
            }

            // Clic sur un item
            list.addEventListener('mousedown', (e) => {
                const item = e.target.closest('.combobox-list-item');
                if (item) {
                    input.value = item.textContent;
                    list.classList.remove('open');
                }
            });

            // Ouvre la liste complète au focus
            input.addEventListener('focus', () => {
                const q = input.value.toLowerCase();
                renderList(q ? allSetups.filter(s => s.toLowerCase().includes(q)) : allSetups);
                list.classList.add('open');
            });

            // Filtre en tapant
            input.addEventListener('input', () => {
                const q = input.value.toLowerCase();
                renderList(q ? allSetups.filter(s => s.toLowerCase().includes(q)) : allSetups);
                list.classList.add('open');
            });

            // Ferme en cliquant ailleurs
            document.addEventListener('click', (e) => {
                if (!document.getElementById('setupCombobox').contains(e.target)) {
                    list.classList.remove('open');
                }
            });
        }

        function toggleSetupDropdown() {
            const list  = document.getElementById('setupList');
            const input = document.getElementById('setup');
            if (list.classList.contains('open')) {
                list.classList.remove('open');
            } else {
                // Rafraîchir la liste et ouvrir
                const q = input.value.toLowerCase();
                const items = q ? allSetups.filter(s => s.toLowerCase().includes(q)) : allSetups;
                const html = items.length
                    ? items.map(s => `<div class="combobox-list-item">${s}</div>`).join('')
                    : '<div class="combobox-list-empty">Aucun setup — tapez pour en créer un</div>';
                list.innerHTML = html;
                list.classList.add('open');
                input.focus();
            }
        }

        // Toast
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.toggle('error', isError);
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); handleSave(); }
        });
    </script>
</body>
</html>
